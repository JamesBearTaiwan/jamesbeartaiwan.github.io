<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的一頁式網站</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div class="container">
      <h1>歡迎來到我的網站</h1>
      <p>這裡可以放你的品牌介紹、服務內容，或產品主打特色。</p>
      <a href="#order" class="btn">立即查看表單</a>
    </div>
  </header>

  <section class="section">
    <div class="container">
      <h2>產品 / 服務介紹</h2>
      <p>
        這裡先放簡單介紹就可以。
        例如：我們提供某種商品、預約服務、代購內容，或旅遊相關方案。
      </p>
    </div>
  </section>

  <section class="section" id="order">
    <div class="container">
      <h2>訂單表單</h2>
      <p>之後這裡會連到 Google 表單，讓客戶填寫資料。</p>
      <a id="form-link" href="#" target="_blank" class="btn">前往填寫表單</a>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <h2>聯絡方式</h2>
      <p>Email：your@email.com</p>
      <p>Instagram：@youraccount</p>
      <p>LINE：yourlineid</p>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p>© 2026 我的品牌名稱</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
