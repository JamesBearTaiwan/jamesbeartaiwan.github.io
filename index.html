<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taiwan Tours Booking</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div class="container">
      <h1>Taiwan Tours Booking</h1>
      <p>Choose your tours, select your travel date and number of people, then add them to your cart.</p>
    </div>
  </header>

  <main class="container main-layout">
    <section class="products-section">
      <h2>Available Tours</h2>
      <div id="products" class="products-grid"></div>
    </section>

    <aside class="cart-section">
      <h2>Your Cart</h2>
      <div id="cart-items" class="cart-items">
        <p class="empty-cart">Your cart is empty.</p>
      </div>
      <div class="cart-total">
        <strong>Total: <span id="cart-total">NT$0</span></strong>
      </div>
      <button id="checkout-btn" class="checkout-btn" disabled>Proceed to Booking</button>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
